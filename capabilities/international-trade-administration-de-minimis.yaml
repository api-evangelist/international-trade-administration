naftiko: 1.0.0-alpha2
info:
  label: International Trade Administration Data Services API — De Minimis
  description: 'International Trade Administration Data Services API — De Minimis. 1 operations. Lead operation: Search De
    Minimis values. Self-contained Naftiko capability covering one International Trade Administration business surface.'
  tags:
  - International Trade Administration
  - De Minimis
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    INTERNATIONAL_TRADE_ADMINISTRATION_API_KEY: INTERNATIONAL_TRADE_ADMINISTRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: international-trade-administration-de-minimis
    baseUri: https://data.trade.gov
    description: International Trade Administration Data Services API — De Minimis business capability. Self-contained, no
      shared references.
    resources:
    - name: de_minimis-v1-search
      path: /de_minimis/v1/search
      operations:
      - name: searchdeminimis
        method: GET
        description: Search De Minimis values
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: countries
          in: query
          type: string
        - name: size
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
    authentication:
      type: apikey
      key: subscription-key
      value: '{{env.INTERNATIONAL_TRADE_ADMINISTRATION_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: international-trade-administration-de-minimis-rest
    port: 8080
    description: REST adapter for International Trade Administration Data Services API — De Minimis. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/de-minimis/v1/search
      name: de-minimis-v1-search
      description: REST surface for de_minimis-v1-search.
      operations:
      - method: GET
        name: searchdeminimis
        description: Search De Minimis values
        call: international-trade-administration-de-minimis.searchdeminimis
        with:
          countries: rest.countries
          size: rest.size
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: international-trade-administration-de-minimis-mcp
    port: 9090
    transport: http
    description: MCP adapter for International Trade Administration Data Services API — De Minimis. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: search-de-minimis-values
      description: Search De Minimis values
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: international-trade-administration-de-minimis.searchdeminimis
      with:
        countries: tools.countries
        size: tools.size
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
