naftiko: 1.0.0-alpha2
info:
  label: International Trade Administration Data Services API — Market Intelligence
  description: 'International Trade Administration Data Services API — Market Intelligence. 1 operations. Lead operation:
    Search Market Intelligence articles. Self-contained Naftiko capability covering one International Trade Administration
    business surface.'
  tags:
  - International Trade Administration
  - Market Intelligence
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    INTERNATIONAL_TRADE_ADMINISTRATION_API_KEY: INTERNATIONAL_TRADE_ADMINISTRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: international-trade-administration-market-intelligence
    baseUri: https://data.trade.gov
    description: International Trade Administration Data Services API — Market Intelligence business capability. Self-contained,
      no shared references.
    resources:
    - name: market_intelligence-v1-search
      path: /market_intelligence/v1/search
      operations:
      - name: searchmarketintelligence
        method: GET
        description: Search Market Intelligence articles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
        - name: countries
          in: query
          type: string
        - name: industries
          in: query
          type: string
        - name: size
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
    authentication:
      type: apikey
      key: subscription-key
      value: '{{env.INTERNATIONAL_TRADE_ADMINISTRATION_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: international-trade-administration-market-intelligence-rest
    port: 8080
    description: REST adapter for International Trade Administration Data Services API — Market Intelligence. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/market-intelligence/v1/search
      name: market-intelligence-v1-search
      description: REST surface for market_intelligence-v1-search.
      operations:
      - method: GET
        name: searchmarketintelligence
        description: Search Market Intelligence articles
        call: international-trade-administration-market-intelligence.searchmarketintelligence
        with:
          q: rest.q
          countries: rest.countries
          industries: rest.industries
          size: rest.size
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: international-trade-administration-market-intelligence-mcp
    port: 9090
    transport: http
    description: MCP adapter for International Trade Administration Data Services API — Market Intelligence. One tool per
      consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: search-market-intelligence-articles
      description: Search Market Intelligence articles
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: international-trade-administration-market-intelligence.searchmarketintelligence
      with:
        q: tools.q
        countries: tools.countries
        industries: tools.industries
        size: tools.size
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
