naftiko: 1.0.0-alpha2
info:
  label: International Trade Administration Data Services API — Trade Events
  description: 'International Trade Administration Data Services API — Trade Events. 1 operations. Lead operation: Search
    Trade Events. Self-contained Naftiko capability covering one International Trade Administration business surface.'
  tags:
  - International Trade Administration
  - Trade Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    INTERNATIONAL_TRADE_ADMINISTRATION_API_KEY: INTERNATIONAL_TRADE_ADMINISTRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: international-trade-administration-trade-events
    baseUri: https://data.trade.gov
    description: International Trade Administration Data Services API — Trade Events business capability. Self-contained,
      no shared references.
    resources:
    - name: events-v1-search
      path: /events/v1/search
      operations:
      - name: searchtradeevents
        method: GET
        description: Search Trade Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
        - name: event_types
          in: query
          type: string
        - name: industries
          in: query
          type: string
        - name: countries
          in: query
          type: string
        - name: start_date
          in: query
          type: string
        - name: end_date
          in: query
          type: string
        - name: size
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
    authentication:
      type: apikey
      key: subscription-key
      value: '{{env.INTERNATIONAL_TRADE_ADMINISTRATION_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: international-trade-administration-trade-events-rest
    port: 8080
    description: REST adapter for International Trade Administration Data Services API — Trade Events. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/events/v1/search
      name: events-v1-search
      description: REST surface for events-v1-search.
      operations:
      - method: GET
        name: searchtradeevents
        description: Search Trade Events
        call: international-trade-administration-trade-events.searchtradeevents
        with:
          q: rest.q
          event_types: rest.event_types
          industries: rest.industries
          countries: rest.countries
          start_date: rest.start_date
          end_date: rest.end_date
          size: rest.size
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: international-trade-administration-trade-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for International Trade Administration Data Services API — Trade Events. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: search-trade-events
      description: Search Trade Events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: international-trade-administration-trade-events.searchtradeevents
      with:
        q: tools.q
        event_types: tools.event_types
        industries: tools.industries
        countries: tools.countries
        start_date: tools.start_date
        end_date: tools.end_date
        size: tools.size
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
