naftiko: 1.0.0-alpha2
info:
  label: International Trade Administration Data Services API — Country Commercial Guides
  description: 'International Trade Administration Data Services API — Country Commercial Guides. 1 operations. Lead operation:
    Search Country Commercial Guides. Self-contained Naftiko capability covering one International Trade Administration business
    surface.'
  tags:
  - International Trade Administration
  - Country Commercial Guides
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    INTERNATIONAL_TRADE_ADMINISTRATION_API_KEY: INTERNATIONAL_TRADE_ADMINISTRATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: international-trade-administration-country-commercial-guides
    baseUri: https://data.trade.gov
    description: International Trade Administration Data Services API — Country Commercial Guides business capability. Self-contained,
      no shared references.
    resources:
    - name: CCG-v2-search
      path: /CCG/v2/search
      operations:
      - name: searchcountrycommercialguides
        method: GET
        description: Search Country Commercial Guides
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
          description: Free-text query.
        - name: countries
          in: query
          type: string
          description: Comma-separated ISO country codes.
        - name: industries
          in: query
          type: string
          description: Comma-separated industry filter.
        - name: size
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
    authentication:
      type: apikey
      key: subscription-key
      value: '{{env.INTERNATIONAL_TRADE_ADMINISTRATION_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: international-trade-administration-country-commercial-guides-rest
    port: 8080
    description: REST adapter for International Trade Administration Data Services API — Country Commercial Guides. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/ccg/v2/search
      name: ccg-v2-search
      description: REST surface for CCG-v2-search.
      operations:
      - method: GET
        name: searchcountrycommercialguides
        description: Search Country Commercial Guides
        call: international-trade-administration-country-commercial-guides.searchcountrycommercialguides
        with:
          q: rest.q
          countries: rest.countries
          industries: rest.industries
          size: rest.size
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: international-trade-administration-country-commercial-guides-mcp
    port: 9090
    transport: http
    description: MCP adapter for International Trade Administration Data Services API — Country Commercial Guides. One tool
      per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: search-country-commercial-guides
      description: Search Country Commercial Guides
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: international-trade-administration-country-commercial-guides.searchcountrycommercialguides
      with:
        q: tools.q
        countries: tools.countries
        industries: tools.industries
        size: tools.size
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
