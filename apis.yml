apis:
  - aid: international-trade-administration:ita-data-services
    name: ITA Data Services Platform
    description: >-
      The ITA Data Services Platform provides direct access to authoritative
      U.S. exporting and international trade information via standard APIs,
      including the Consolidated Screening List, Country Commercial Guides,
      Market Intelligence, Trade Events, Customs Info Tariff Database, and
      De Minimis values. Access requires a subscription key issued through
      the developer portal.
