apis:
  - aid: international-trade-administration:ita-data-services
    name: ITA Data Services Platform
    description: >-
      The ITA Data Services Platform provides direct access to authoritative
      information on U.S. exporting and international trade via standard APIs,
      including trade leads, tariff rates, country commercial guides, and
      trade event information.
