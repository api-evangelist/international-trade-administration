aid: international-trade-administration
name: International Trade Administration
description: >-
  The International Trade Administration (ITA) creates prosperity by
  strengthening the international competitiveness of U.S. industry, promoting
  trade and investment, and ensuring fair trade and compliance with trade laws
  and agreements. ITA provides APIs for accessing authoritative information on
  U.S. exporting and international trade.
