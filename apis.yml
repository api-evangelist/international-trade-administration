aid: international-trade-administration
name: International Trade Administration
description: >-
  The International Trade Administration (ITA) creates prosperity by
  strengthening the international competitiveness of U.S. industry,
  promoting trade and investment, and ensuring fair trade and compliance
  with trade laws and agreements. ITA's Data Services Platform provides
  authoritative APIs for U.S. exporting and international trade including
  the Consolidated Screening List, Country Commercial Guides, Market
  Intelligence, Trade Events, Customs Tariff lookups, and De Minimis
  thresholds.
type: Index
